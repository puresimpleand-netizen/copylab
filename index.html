<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>copy/lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F2EFE9; }
.cl-mode:hover { background: #EDEBE5 !important; }
.cl-mode.on { background: #1C1915 !important; color: #F5F2EC !important; }
.cl-btn:hover:not(:disabled) { background: #A83412 !important; }
.cl-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.cl-input:focus { border-color: #C8401A !important; }
.cl-copy:hover { background: #EDEBE5 !important; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #CEC9C0; border-radius: 2px; }
@keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
.cl-fade { animation: pop 0.3s ease; }
.cl-dot { animation: blink 1.2s ease-in-out infinite; }
.cl-vtab { transition: background 0.15s, color 0.15s; }
.cl-vtab.sel { background: #1C1915 !important; color: #F5F2EC !important; }
.cl-tag:hover { opacity: 0.85; }
select.cl-input { cursor: pointer; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const COPY_TYPES = [
  { value: "headline", label: "Headline" },
  { value: "tagline", label: "Tagline" },
  { value: "cta", label: "CTA" },
  { value: "social_caption", label: "Social Caption" },
  { value: "product_description", label: "Product Description" },
  { value: "onboarding_message", label: "Onboarding / Welcome" },
  { value: "push_notification", label: "Push Notification" },
  { value: "email_subject", label: "Email Subject Line" },
  { value: "tooltip", label: "Tooltip / Microcopy" },
  { value: "error_message", label: "Error Message" },
  { value: "empty_state", label: "Empty State" },
];
const TONE_TAGS = ["Confident","Playful","Direct","Warm","Premium","Minimal","Urgent","Conversational","Bold","Empowering","Witty","Grounded"];

let state = {
  mode: "generate", loading: false, error: null, result: null, selectedV: 0, copied: null,
  brief: "", copyType: "headline", tones: [],
  inputCopy: "", context: "", analyzeFormat: "headline",
  apiKey: localStorage.getItem("cl_gemini_key") || "",
};

function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

async function callClaude(systemPrompt, userPrompt) {
  if (!state.apiKey.trim()) {
    throw new Error("NO_KEY");
  }
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + encodeURIComponent(state.apiKey.trim()), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: [{ role: "user", parts: [{ text: userPrompt }] }],
      generationConfig: { temperature: 0.9, maxOutputTokens: 1500 },
    }),
  });
  if (!res.ok) {
    const errBody = await res.text().catch(() => "");
    throw new Error("API_ERROR:" + res.status + ":" + errBody);
  }
  const data = await res.json();
  const text = ((data.candidates || [])[0]?.content?.parts || []).map(p => p.text || "").join("");
  const clean = text.replace(/```json\n?|```/g, "").trim();
  return JSON.parse(clean);
}

function toggleTone(t) {
  state.tones = state.tones.includes(t) ? state.tones.filter(x => x !== t) : [...state.tones, t];
  render();
}

function handleCopyText(text, id) {
  navigator.clipboard.writeText(text).catch(() => {});
  state.copied = id;
  render();
  setTimeout(() => { state.copied = null; render(); }, 2000);
}
function copyVariant(i) { handleCopyText(state.result.variants[i].copy, "main"); }
function copyRewrite() { handleCopyText(state.result.rewrite, "rewrite"); }

async function handleGenerate() {
  if (!state.brief.trim()) return;
  state.loading = true; state.error = null; state.result = null; render();
  try {
    const sys = "You are a senior UX copywriter and brand strategist. Return ONLY valid JSON. No markdown, no preamble.";
    const usr = 'Write 3 distinct variants of ' + state.copyType.replace(/_/g, " ") + ' copy for: "' + state.brief + '"\nTone: ' + (state.tones.length ? state.tones.join(", ") : "balanced and on-brand") + '\nReturn:\n{"variants":[{"copy":"","angle":"2-3 word label","rationale":"1-2 sentences","strength":"1 sentence","watch_out":"1 honest limitation"}]}';
    const data = await callClaude(sys, usr);
    state.result = { type: "generate", ...data };
    state.selectedV = 0;
  } catch (e) {
    state.error = describeError(e);
  }
  state.loading = false; render();
}

async function handleAnalyze() {
  if (!state.inputCopy.trim()) return;
  state.loading = true; state.error = null; state.result = null; render();
  try {
    const sys = "You are a senior UX copy strategist. Be precise and direct. Return ONLY valid JSON. No markdown, no preamble.";
    const usr = 'Review this ' + state.analyzeFormat.replace(/_/g, " ") + ': "' + state.inputCopy + '"\n' + (state.context ? "Context: " + state.context : "") + '\nReturn:\n{"verdict":"one sharp sentence","overall_score":78,"scores":{"clarity":{"score":80,"note":""},"brand_voice":{"score":75,"note":""},"audience_fit":{"score":82,"note":""},"accuracy":{"score":85,"note":""},"structure":{"score":70,"note":""}},"flags":["problem 1"],"improvements":["suggestion 1"],"rewrite":"sharper version or null"}';
    const data = await callClaude(sys, usr);
    state.result = { type: "analyze", ...data };
  } catch (e) {
    state.error = describeError(e);
  }
  state.loading = false; render();
}

function switchMode(m) { state.mode = m; state.result = null; state.error = null; render(); }
function selectVariant(i) { state.selectedV = i; render(); }

function describeError(e) {
  const msg = (e && e.message) || "";
  if (msg === "NO_KEY") return "Add your Gemini API key above first (get one free at aistudio.google.com/apikey).";
  if (msg.startsWith("API_ERROR:400")) return "Gemini rejected the request — check your API key is valid.";
  if (msg.startsWith("API_ERROR:403")) return "API key invalid or not authorized. Double-check it in Google AI Studio.";
  if (msg.startsWith("API_ERROR:429")) return "Rate limit hit — wait a moment and try again.";
  if (msg.startsWith("API_ERROR:")) return "Gemini API error. Try again in a moment.";
  return "Something went wrong parsing the response. Try again.";
}

function saveApiKey(val) {
  state.apiKey = val;
  localStorage.setItem("cl_gemini_key", val);
}

const inputBase = "width:100%;padding:13px 14px;background:#F9F7F3;border:1.5px solid #E0DBD2;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;color:#1C1915;outline:none;box-sizing:border-box;line-height:1.55;";
const labelStyle = "display:block;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#9A9590;margin-bottom:8px;";

function scoreColor(s) { return s >= 80 ? "#1E7A48" : s >= 60 ? "#C07820" : "#C0392B"; }
function scoreLabelFn(s) { return s >= 80 ? "Strong" : s >= 65 ? "Needs work" : "Weak"; }

function renderTag(label) {
  const active = state.tones.includes(label);
  return '<button class="cl-tag" onclick="toggleTone(\'' + label + '\')" style="padding:6px 13px;border-radius:20px;border:1.5px solid ' + (active ? "#C8401A" : "#DEDAD3") + ';background:' + (active ? "#C8401A" : "transparent") + ';color:' + (active ? "#FFF" : "#7A7570") + ';cursor:pointer;font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:500;line-height:1;">' + esc(label) + '</button>';
}

function renderScoreBar(label, score, note) {
  const color = scoreColor(score);
  return '<div style="margin-bottom:16px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">' +
    '<span style="font-size:13px;font-weight:600;color:#1C1915;font-family:\'DM Sans\',sans-serif;">' + esc(label) + '</span>' +
    '<span style="font-family:\'DM Mono\',monospace;font-size:11px;font-weight:500;color:' + color + ';background:' + color + '15;border:1px solid ' + color + '25;border-radius:3px;padding:1px 7px;">' + score + '</span></div>' +
    '<div style="height:4px;background:#E8E3DB;border-radius:2px;margin-bottom:5px;overflow:hidden;">' +
    '<div style="height:100%;width:' + score + '%;background:' + color + ';border-radius:2px;"></div></div>' +
    '<p style="font-size:12px;color:#8A8580;margin:0;line-height:1.5;font-family:\'DM Sans\',sans-serif;">' + esc(note) + '</p></div>';
}

function renderPill(type, text) {
  const s = type === "flag" ? { bg: "#FFF0EC", border: "#C8401A25", text: "#A63315", dot: "#C8401A" } : { bg: "#F0FBF5", border: "#1E7A4820", text: "#1A5C38", dot: "#1E7A48" };
  return '<div style="display:flex;gap:8px;align-items:flex-start;padding:10px 13px;background:' + s.bg + ';border:1px solid ' + s.border + ';border-radius:8px;margin-bottom:7px;">' +
    '<div style="width:5px;height:5px;border-radius:50%;background:' + s.dot + ';margin-top:6px;flex-shrink:0;"></div>' +
    '<p style="font-size:13px;color:' + s.text + ';font-family:\'DM Sans\',sans-serif;margin:0;line-height:1.55;">' + esc(text) + '</p></div>';
}

function renderSelect(id, value, onchange) {
  return '<select class="cl-input" id="' + id + '" onchange="' + onchange + '" style="' + inputBase + 'cursor:pointer;">' +
    COPY_TYPES.map(t => '<option value="' + t.value + '"' + (t.value === value ? " selected" : "") + '>' + esc(t.label) + '</option>').join('') +
    '</select>';
}

function renderGenerateForm() {
  return '<div style="display:flex;flex-direction:column;gap:18px;">' +
    '<div><label style="' + labelStyle + '">Copy Type</label>' + renderSelect("copyTypeSel", state.copyType, "state.copyType=this.value") + '</div>' +
    '<div><label style="' + labelStyle + '">Brief</label>' +
    '<textarea class="cl-input" id="briefInput" rows="5" placeholder="What are you writing? Product, feature, campaign moment, placement, goal — the more context, the better." style="' + inputBase + 'resize:none;" oninput="state.brief=this.value; updateGenBtn();">' + esc(state.brief) + '</textarea></div>' +
    '<div><label style="' + labelStyle + '">Tone <span style="font-weight:400;letter-spacing:0;text-transform:none;color:#B0ABA4;">(pick any)</span></label>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + TONE_TAGS.map(renderTag).join('') + '</div></div>' +
    '<button class="cl-btn" id="genBtn" onclick="handleGenerate()" ' + (state.loading || !state.brief.trim() ? "disabled" : "") + ' style="padding:15px;background:#C8401A;color:#FFF;border:none;border-radius:8px;font-family:\'Syne\',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;cursor:pointer;transition:background 0.15s;">' +
    (state.loading ? "Generating…" : "Generate 3 variants →") + '</button></div>';
}

function renderAnalyzeForm() {
  return '<div style="display:flex;flex-direction:column;gap:18px;">' +
    '<div><label style="' + labelStyle + '">Format</label>' + renderSelect("formatSel", state.analyzeFormat, "state.analyzeFormat=this.value") + '</div>' +
    '<div><label style="' + labelStyle + '">Copy to Analyze</label>' +
    '<textarea class="cl-input" rows="4" placeholder="Paste the copy here." style="' + inputBase + 'resize:none;" oninput="state.inputCopy=this.value; updateAnaBtn();">' + esc(state.inputCopy) + '</textarea></div>' +
    '<div><label style="' + labelStyle + '">Context <span style="font-weight:400;letter-spacing:0;text-transform:none;color:#B0ABA4;">(optional)</span></label>' +
    '<textarea class="cl-input" rows="3" placeholder="Campaign goal, placement, constraints, feedback already received…" style="' + inputBase + 'resize:none;" oninput="state.context=this.value;">' + esc(state.context) + '</textarea></div>' +
    '<button class="cl-btn" id="anaBtn" onclick="handleAnalyze()" ' + (state.loading || !state.inputCopy.trim() ? "disabled" : "") + ' style="padding:15px;background:#C8401A;color:#FFF;border:none;border-radius:8px;font-family:\'Syne\',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.04em;cursor:pointer;transition:background 0.15s;">' +
    (state.loading ? "Analyzing…" : "Run Analysis →") + '</button></div>';
}

function updateGenBtn() { const b = document.getElementById("genBtn"); if (b) b.disabled = state.loading || !state.brief.trim(); }
function updateAnaBtn() { const b = document.getElementById("anaBtn"); if (b) b.disabled = state.loading || !state.inputCopy.trim(); }

function renderLoading() {
  return '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0;">' +
    '<div style="display:flex;gap:6px;">' + [0,1,2].map(i => '<div class="cl-dot" style="width:8px;height:8px;border-radius:50%;background:#C8401A;animation-delay:' + (i*0.18) + 's;"></div>').join('') + '</div>' +
    '<p style="color:#A0998F;font-size:13px;">' + (state.mode === "generate" ? "Crafting 3 strategic variants…" : "Running full copy audit…") + '</p></div>';
}

function renderError() {
  return '<div style="margin-top:20px;padding:14px 16px;background:#FFF0EC;border:1.5px solid #C8401A30;border-radius:8px;color:#A63315;font-size:13px;line-height:1.5;">' + esc(state.error) + '</div>';
}

function renderGenerateResults() {
  const r = state.result;
  let html = '<div class="cl-fade" style="margin-top:28px;">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">' +
    '<h2 style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:15px;color:#1C1915;letter-spacing:-0.3px;">3 Variants</h2>' +
    '<span style="font-family:\'DM Mono\',monospace;font-size:9px;color:#9A9590;letter-spacing:0.06em;text-transform:uppercase;">' + esc((COPY_TYPES.find(t => t.value === state.copyType) || {}).label || "") + '</span></div>';

  html += '<div style="display:flex;gap:5px;margin-bottom:16px;">';
  (r.variants || []).forEach((v, i) => {
    html += '<button class="cl-vtab ' + (state.selectedV === i ? "sel" : "") + '" onclick="selectVariant(' + i + ')" style="flex:1;padding:9px 6px;background:#E8E4DC;color:#7A7570;border:none;border-radius:6px;cursor:pointer;font-family:\'Syne\',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(v.angle || ("V" + (i+1))) + '</button>';
  });
  html += '</div>';

  const v = (r.variants || [])[state.selectedV];
  if (v) {
    html += '<div style="display:flex;flex-direction:column;gap:10px;">' +
      '<div style="background:#FFF;border:1.5px solid #DDD9D0;border-radius:10px;padding:20px 16px 16px;position:relative;">' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:22px;color:#1C1915;line-height:1.25;letter-spacing:-0.4px;padding-right:52px;">"' + esc(v.copy) + '"</p>' +
      '<button class="cl-copy" onclick="copyVariant(' + state.selectedV + ')" style="position:absolute;top:14px;right:12px;padding:5px 10px;background:#F2EFE9;border:1px solid #DDD9D0;border-radius:4px;cursor:pointer;font-family:\'DM Mono\',monospace;font-size:10px;color:' + (state.copied === "main" ? "#1E7A48" : "#9A9590") + ';">' + (state.copied === "main" ? "✓" : "Copy") + '</button></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
      '<div style="padding:12px 13px;background:#F0FBF5;border:1px solid #1E7A4820;border-radius:8px;">' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#1E7A48;margin-bottom:5px;">What lands</p>' +
      '<p style="font-size:12px;color:#1A5C38;line-height:1.55;">' + esc(v.strength) + '</p></div>' +
      '<div style="padding:12px 13px;background:#FFF8F0;border:1px solid #C0782020;border-radius:8px;">' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#C07820;margin-bottom:5px;">Watch out</p>' +
      '<p style="font-size:12px;color:#7A4E10;line-height:1.55;">' + esc(v.watch_out) + '</p></div></div>' +
      '<div style="padding:13px 14px;background:#F7F5F0;border:1px solid #DDD9D0;border-radius:8px;">' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#9A9590;margin-bottom:6px;">Strategy</p>' +
      '<p style="font-size:13px;color:#3A3730;line-height:1.6;">' + esc(v.rationale) + '</p></div></div>';
  }
  html += '</div>';
  return html;
}

function renderAnalyzeResults() {
  const r = state.result;
  const c = scoreColor(r.overall_score);
  let html = '<div class="cl-fade" style="margin-top:28px;display:flex;flex-direction:column;gap:12px;">';
  html += '<div style="padding:18px 16px;background:#1C1915;border-radius:10px;">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
    '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:#C8401A;">Verdict</p>' +
    '<div style="flex:1;height:1px;background:#333;"></div>' +
    '<span style="font-family:\'DM Mono\',monospace;font-size:11px;font-weight:500;color:' + c + ';background:' + c + '25;border:1px solid ' + c + '30;border-radius:4px;padding:2px 8px;">' + scoreLabelFn(r.overall_score) + '</span></div>' +
    '<p style="font-family:\'Syne\',sans-serif;font-weight:600;font-size:15px;color:#F5F2EC;line-height:1.4;margin-bottom:12px;">' + esc(r.verdict) + '</p>' +
    '<div style="display:flex;align-items:baseline;gap:6px;">' +
    '<span style="font-family:\'DM Mono\',monospace;font-size:32px;font-weight:500;color:' + c + ';">' + r.overall_score + '</span>' +
    '<span style="font-size:12px;color:#5A5550;">/100</span></div></div>';

  html += '<div style="background:#FFF;border:1.5px solid #DDD9D0;border-radius:10px;padding:16px;">' +
    '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#9A9590;margin-bottom:14px;">Scorecard</p>';
  if (r.scores) {
    Object.entries(r.scores).forEach(([k, v]) => {
      const label = k.replace(/_/g, " ").replace(/\b\w/g, l => l.toUpperCase());
      html += renderScoreBar(label, v.score, v.note);
    });
  }
  html += '</div>';

  if (r.flags && r.flags.length > 0) {
    html += '<div><p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#C8401A;margin-bottom:8px;">⚑ Flags</p>' +
      r.flags.map(f => renderPill("flag", f)).join('') + '</div>';
  }
  if (r.improvements && r.improvements.length > 0) {
    html += '<div><p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#1E7A48;margin-bottom:8px;">↑ Improvements</p>' +
      r.improvements.map(f => renderPill("fix", f)).join('') + '</div>';
  }
  if (r.rewrite) {
    html += '<div style="padding:16px;background:#FFF;border:1.5px solid #C8401A25;border-radius:8px;position:relative;">' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#9A9590;margin-bottom:10px;">✦ Suggested rewrite</p>' +
      '<p style="font-family:\'Syne\',sans-serif;font-weight:700;font-size:20px;color:#1C1915;line-height:1.25;letter-spacing:-0.3px;padding-right:52px;">"' + esc(r.rewrite) + '"</p>' +
      '<button class="cl-copy" onclick="copyRewrite()" style="position:absolute;top:14px;right:14px;padding:5px 10px;background:#F2EFE9;border:1px solid #DDD9D0;border-radius:4px;cursor:pointer;font-family:\'DM Mono\',monospace;font-size:10px;color:' + (state.copied === "rewrite" ? "#1E7A48" : "#9A9590") + ';">' + (state.copied === "rewrite" ? "✓" : "Copy") + '</button></div>';
  }
  html += '</div>';
  return html;
}

function render() {
  const app = document.getElementById("app");
  let body = state.mode === "generate" ? renderGenerateForm() : renderAnalyzeForm();
  if (state.loading) body += renderLoading();
  if (!state.loading && state.error) body += renderError();
  if (!state.loading && state.result && state.result.type === "generate") body += renderGenerateResults();
  if (!state.loading && state.result && state.result.type === "analyze") body += renderAnalyzeResults();

  app.innerHTML =
    '<div style="min-height:100vh;background:#F2EFE9;font-family:\'DM Sans\',sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;">' +
    '<header style="height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #DDD9D0;background:#F2EFE9;position:sticky;top:0;z-index:10;">' +
    '<span style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:18px;color:#1C1915;letter-spacing:-0.5px;">copy/lab' +
    '<span style="font-family:\'DM Mono\',monospace;font-size:9px;color:#C8401A;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border:1px solid #C8401A30;border-radius:3px;background:#FFF0EC;margin-left:8px;">beta</span></span>' +
    '<div style="display:flex;background:#E8E4DC;border-radius:7px;padding:3px;gap:2px;">' +
    ["generate","analyze"].map(m => '<button class="cl-mode ' + (state.mode === m ? "on" : "") + '" onclick="switchMode(\'' + m + '\')" style="padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-family:\'Syne\',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.03em;background:transparent;color:#7A7570;transition:all 0.15s;">' + (m === "generate" ? "Generate" : "Analyze") + '</button>').join('') +
    '</div></header>' +
    '<div style="padding:10px 20px 0;">' +
    '<input type="password" class="cl-input" value="' + esc(state.apiKey) + '" placeholder="Gemini API key (get one free at aistudio.google.com/apikey)" oninput="saveApiKey(this.value)" style="' + inputBase + 'font-size:12px;padding:9px 12px;" /></div>' +
    '<div style="flex:1;overflow-y:auto;padding:20px 20px 40px;">' + body + '</div>' +
    '</div>';
}

render();
</script>
